services:
  postgres:
    image: postgres:16
    container_name: treino-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_treino
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: